<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FZFX Pro - Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif; }
    body { min-height: 100vh; background: radial-gradient(circle at top, #1b2a3a 0, #050810 55%, #020308 100%); color: #e8f5ff; display: flex; justify-content: center; align-items: center; padding: 24px; }
    .container { width: 100%; max-width: 420px; background: rgba(3,10,20,0.96); border-radius: 20px; padding: 40px 32px; box-shadow: 0 24px 60px rgba(0,0,0,0.8); border: 1px solid rgba(120,220,255,0.15); }
    .logo { text-align: center; margin-bottom: 32px; }
    .logo h1 { font-size: 28px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #b2f5ff; margin-bottom: 8px; }
    .logo p { font-size: 13px; color: #7ea0c0; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 12px; color: #8fb4d8; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.08em; }
    input { width: 100%; padding: 12px 14px; border-radius: 10px; border: 1px solid #253347; background: #050b15; color: #e8f5ff; font-size: 14px; outline: none; transition: all 0.2s; }
    input:focus { border-color: #49e0b7; box-shadow: 0 0 0 1px #49e0b733; }
    .btn-primary { width: 100%; padding: 14px; border-radius: 999px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; background: linear-gradient(90deg,#11c5a5,#46ff88); color: #021110; box-shadow: 0 8px 22px rgba(0,255,153,0.35); margin-top: 10px; transition: transform 0.1s; }
    .btn-primary:hover { transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .links { text-align: center; margin-top: 24px; font-size: 13px; color: #7ea0c0; }
    .links a { color: #49e0b7; text-decoration: none; }
    .links a:hover { text-decoration: underline; }
    .error { background: rgba(255,87,87,0.15); border: 1px solid rgba(255,87,87,0.4); color: #ffb3b3; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; }
    .divider { text-align: center; margin: 20px 0 8px; font-size: 12px; color: #7ea0c0; }
    .reset-link { display: block; text-align: center; margin-top: 12px; font-size: 12px; color: #49e0b7; cursor: pointer; background: none; border: none; width: 100%; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <h1>FZFX Pro</h1>
      <p>Professional Trade Journal</p>
    </div>

    <div id="errorMsg" class="error"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="seu@email.com" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn-primary" id="loginBtn">Sign In</button>
    </form>

    <button class="reset-link" id="resetBtn">Forgot password?</button>

    <div class="links">
      <p style="margin-top:16px;">Don't have an account? <a href="register.html">Sign up free</a></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // ====================================================
    // CREDENCIAIS - atualize se resetar as chaves
    // ====================================================
    const SUPABASE_URL = 'https://txvcrqomdiquoupfmnng.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR4dmNycW9tZGlxdW91cGZtbm5nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MzYxNzYsImV4cCI6MjA5MDMxMjE3Nn0.QdMaX5cy8a3pqTcKK7f5-QPvsrhjDM2YXVeZ1WEfbI4';
    // ====================================================

    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const errorEl = document.getElementById('errorMsg');
    const loginBtn = document.getElementById('loginBtn');

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.style.display = 'block';
    }

    // Se já estiver logado, vai direto pro app
    (async () => {
      const { data: { session } } = await sb.auth.getSession();
      if (session) window.location.href = 'app.html';
    })();

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.style.display = 'none';
      loginBtn.disabled = true;
      loginBtn.textContent = 'Signing in...';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      const { data, error } = await sb.auth.signInWithPassword({ email, password });

      if (error) {
        showError(error.message);
        loginBtn.disabled = false;
        loginBtn.textContent = 'Sign In';
        return;
      }

      // Garantir que perfil existe
      const { data: profile } = await sb.from('profiles').select('id').eq('id', data.user.id).single();
      if (!profile) {
        await sb.from('profiles').insert({
          id: data.user.id,
          email: data.user.email,
          plan: 'free',
          status: 'active'
        });
      }

      window.location.href = 'app.html';
    });

    document.getElementById('resetBtn').addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();
      if (!email) { showError('Enter your email first, then click Forgot password.'); return; }
      const { error } = await sb.auth.resetPasswordForEmail(email);
      if (error) showError(error.message);
      else alert('Password reset email sent! Check your inbox.');
    });
  </script>
</body>
</html>
