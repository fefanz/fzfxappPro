<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FZFX Pro - Subscribe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif; }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, #1b2a3a 0, #050810 55%, #020308 100%);
      color: #e8f5ff;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .container { width: 100%; max-width: 420px; text-align: center; }

    .header { margin-bottom: 40px; }
    .header h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #b2f5ff;
      margin-bottom: 10px;
    }
    .header p { font-size: 14px; color: #7ea0c0; }

    .plan {
      background: rgba(3,10,20,0.96);
      border-radius: 20px;
      padding: 36px 28px;
      border: 1px solid #49e0b7;
      box-shadow: 0 0 40px rgba(73,224,183,0.15);
    }

    .badge {
      background: linear-gradient(90deg,#11c5a5,#46ff88);
      color: #021110;
      padding: 6px 18px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      margin-bottom: 18px;
      display: inline-block;
    }

    .plan-name { font-size: 18px; margin-bottom: 6px; }
    .plan-price {
      font-size: 46px;
      font-weight: 800;
      color: #b2ffe4;
    }

    .plan-period {
      font-size: 13px;
      color: #7ea0c0;
      margin-bottom: 22px;
    }

    .features {
      list-style: none;
      margin-bottom: 26px;
      text-align: left;
    }

    .features li {
      padding: 8px 0;
      font-size: 13px;
      color: #9fb7d8;
      display: flex;
      gap: 10px;
    }

    .features li::before {
      content: "✓";
      color: #46ff88;
      font-weight: 700;
    }

    .btn {
      width: 100%;
      padding: 15px;
      border-radius: 999px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(90deg,#11c5a5,#46ff88);
      color: #021110;
      box-shadow: 0 8px 22px rgba(0,255,153,0.3);
      transition: all 0.2s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(0,255,153,0.4);
    }

    .btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .payment {
      margin-top: 12px;
      font-size: 11px;
      color: #5a8a6a;
    }

    .logout {
      margin-top: 20px;
      font-size: 12px;
      color: #4a6480;
      cursor: pointer;
      background: none;
      border: none;
    }

    .logout:hover { color: #ffaaaa; }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>FZFX Pro</h1>
    <p>Unlock full access to your trading system</p>
  </div>

  <div class="plan">
    <div class="badge">BEST VALUE</div>
    <div class="plan-name">Pro Access</div>
    <div class="plan-price">$4.99</div>
    <div class="plan-period">per month</div>

    <ul class="features">
      <li>Unlimited trade journal</li>
      <li>Advanced analytics</li>
      <li>Cloud sync & backup</li>
      <li>Validator system</li>
      <li>Performance tracking</li>
      <li>Priority support</li>
    </ul>

    <button class="btn" id="btnPay" onclick="startPayment()">
      💳 Subscribe — $4.99/mo
    </button>

    <div class="payment">⚡ Secure payment via card (USDT processed)</div>
  </div>

  <button class="logout" onclick="logout()">← Sign out</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://txvcrqomdiquoupfmnng.supabase.co';
  const SUPABASE_ANON_KEY = 'SUA_KEY_AQUI';
  const NOWPAYMENTS_API_KEY = 'SUA_API_AQUI';

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  let currentUser = null;

  async function init() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) {
      window.location.href = 'login.html';
      return;
    }
    currentUser = session.user;
  }

  async function startPayment() {
    const btn = document.getElementById('btnPay');
    btn.disabled = true;
    btn.textContent = 'Processing...';

    try {
      const response = await fetch('https://api.nowpayments.io/v1/invoice', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': NOWPAYMENTS_API_KEY
        },
        body: JSON.stringify({
          price_amount: 4.99,
          price_currency: 'usd',
          pay_currency: 'usdttrc20',
          order_id: `fzfx_${currentUser?.id || 'guest'}_${Date.now()}`,
          order_description: 'FZFX Pro Subscription',
          success_url: `${window.location.origin}/subscribe.html?paid=success`,
          cancel_url: `${window.location.origin}/subscribe.html?paid=cancel`
        })
      });

      const raw = await response.text();
      let data = {};

      try {
        data = JSON.parse(raw);
      } catch {
        data = { raw };
      }

      console.log('NOWPayments status:', response.status);
      console.log('NOWPayments response:', data);

      if (!response.ok) {
        throw new Error(
          data.message ||
          data.error ||
          data.raw ||
          `HTTP ${response.status}`
        );
      }

      if (data.invoice_url) {
        window.location.href = data.invoice_url;
        return;
      }

      throw new Error('Invoice created without invoice_url.');
    } catch (err) {
      console.error('Payment error:', err);
      alert('Payment error: ' + err.message);
      btn.disabled = false;
      btn.textContent = '💳 Subscribe — $4.99/mo';
    }
  }

  async function logout() {
    await sb.auth.signOut();
    window.location.href = 'login.html';
  }

  init();
</script>

</body>
</html>
