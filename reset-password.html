<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Protocol FZFX - Reset Password</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif; }
    body { min-height: 100vh; background: radial-gradient(circle at top, #1b2a3a 0, #050810 55%, #020308 100%); color: #e8f5ff; display: flex; justify-content: center; align-items: center; padding: 24px; }
    .container { width: 100%; max-width: 420px; background: rgba(3,10,20,0.96); border-radius: 20px; padding: 40px 32px; box-shadow: 0 24px 60px rgba(0,0,0,0.8); border: 1px solid rgba(120,220,255,0.15); }
    .logo { text-align: center; margin-bottom: 32px; }
    .logo h1 { font-size: 28px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #b2f5ff; margin-bottom: 8px; }
    .logo p { font-size: 13px; color: #7ea0c0; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 12px; color: #8fb4d8; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.08em; }
    input { width: 100%; padding: 12px 14px; border-radius: 10px; border: 1px solid #253347; background: #050b15; color: #e8f5ff; font-size: 14px; outline: none; transition: all 0.2s; }
    input:focus { border-color: #49e0b7; box-shadow: 0 0 0 1px #49e0b733; }
    .btn-primary { width: 100%; padding: 14px; border-radius: 999px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; background: linear-gradient(90deg,#11c5a5,#46ff88); color: #021110; box-shadow: 0 8px 22px rgba(0,255,153,0.35); margin-top: 10px; transition: transform 0.1s; }
    .btn-primary:hover { transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .links { text-align: center; margin-top: 24px; font-size: 13px; color: #7ea0c0; }
    .links a { color: #49e0b7; text-decoration: none; }
    .links a:hover { text-decoration: underline; }
    .error { background: rgba(255,87,87,0.15); border: 1px solid rgba(255,87,87,0.4); color: #ffb3b3; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; }
    .success { background: rgba(61,255,192,0.1); border: 1px solid rgba(61,255,192,0.35); color: #3DFFC0; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; }
    .invalid-state { text-align: center; padding: 16px 0; }
    .invalid-state p { color: #ffb3b3; font-size: 14px; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <h1>Protocol FZFX</h1>
      <p>Set a new password</p>
    </div>

    <div id="errorMsg" class="error"></div>
    <div id="successMsg" class="success"></div>

    <div id="invalidState" class="invalid-state" style="display:none;">
      <p>This reset link is invalid or has expired.</p>
      <a href="login.html" style="color:#49e0b7;font-size:14px;">Back to login</a>
    </div>

    <form id="resetForm">
      <div class="form-group">
        <label for="password">New Password</label>
        <input type="password" id="password" placeholder="••••••••" minlength="8" required />
      </div>
      <div class="form-group">
        <label for="confirm">Confirm Password</label>
        <input type="password" id="confirm" placeholder="••••••••" minlength="8" required />
      </div>
      <button type="submit" class="btn-primary" id="submitBtn">Update Password</button>
    </form>

    <div class="links">
      <a href="login.html">Back to login</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://biciobgnkodvhgltayqc.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_JXWPM5vOGwBq63OC8bxf7Q_7EnF57Rz';

    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const errorEl   = document.getElementById('errorMsg');
    const successEl = document.getElementById('successMsg');
    const resetForm = document.getElementById('resetForm');
    const submitBtn = document.getElementById('submitBtn');
    const invalidEl = document.getElementById('invalidState');

    let recoveryReady = false;

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.style.display = 'block';
      successEl.style.display = 'none';
    }

    function showSuccess(msg) {
      successEl.textContent = msg;
      successEl.style.display = 'block';
      errorEl.style.display = 'none';
    }

    // Supabase v2 fires PASSWORD_RECOVERY when the hash contains type=recovery
    sb.auth.onAuthStateChange((event) => {
      if (event === 'PASSWORD_RECOVERY') {
        recoveryReady = true;
      }
    });

    // Detect missing or invalid token upfront
    const hash = window.location.hash;
    const params = new URLSearchParams(hash.replace('#', '?'));
    if (!hash || params.get('type') !== 'recovery' || !params.get('access_token')) {
      resetForm.style.display = 'none';
      invalidEl.style.display = 'block';
    }

    resetForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.style.display = 'none';

      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;

      if (password !== confirm) {
        showError('Passwords do not match.');
        return;
      }
      if (password.length < 8) {
        showError('Password must be at least 8 characters.');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Updating...';

      const { error } = await sb.auth.updateUser({ password });

      if (error) {
        showError(error.message);
        submitBtn.disabled = false;
        submitBtn.textContent = 'Update Password';
        return;
      }

      showSuccess('Password updated! Redirecting to login…');
      await sb.auth.signOut();
      setTimeout(() => { window.location.href = 'login.html'; }, 1800);
    });
  </script>
</body>
</html>
